<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Engineering Station</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    :root { --accent: #ffb347; }
    /* Power rows own their own breaker restore. A healthy system shows its pips
       and −/+ buttons; when its breaker TRIPS, the restore controls (arm slider +
       3-tap) replace that row's controls in place, so the fix lives right on the
       system it fixes. Two-step restore: slide fully right to ARM, then tap the
       button three times to re-power. A tripped system runs at half power until
       restored. */
    .pwr-row { margin-bottom: 0.6rem; min-height: 3.2rem; display: flex; align-items: center; }
    .pwr-controls { display: flex; align-items: center; gap: 0.5rem; width: 100%; }
    .pwr-controls .pwr-mid { flex: 1.2; }
    .pwr-controls .pwr-btn { flex: 0.5; }
    .pwr-row.tripped .pwr-controls { display: none; }
    .brk-restore { display: none; }
    .pwr-row.tripped .brk-restore {
      display: flex; flex-direction: column; gap: 0.4rem; width: 100%;
      border: 1px solid #ff6f6f66; border-radius: 8px; padding: 0.5rem 0.6rem;
    }
    .brk-label { font-weight: 600; color: #ff6f6f; }
    .brk-slider { width: 100%; accent-color: var(--accent); }
    .brk-tap { width: 100%; }
    .brk-tap:disabled { opacity: 0.5; }
  </style>
</head>
<body>
  <header>
    <h1>Engineering</h1>
    <span class="room-code"></span>
    <span class="conn-dot"></span>
  </header>
  <div id="toasts"></div>

  <main>
    <!-- Power budget: 7 units across four systems, max 4 each. Each row also
         holds its breaker restore, shown in place when that system trips. -->
    <div class="panel">
      <h2>Power Distribution <span id="power-free" style="color:var(--accent)"></span></h2>
      <div id="power-systems"></div>
      <!-- Power presets (P#11): stash the current split and re-apply in one tap. -->
      <div class="row" style="margin-top:0.6rem;">
        <button id="preset-save">Save Preset</button>
        <button id="preset-load">Load Preset</button>
      </div>
    </div>

    <!-- Sensors: detection range + one-shot active pulse -->
    <div class="panel">
      <h2>Sensors <span id="sensor-range" style="color:var(--accent)"></span></h2>
      <p style="color:var(--dim); font-size:0.85rem; margin-bottom:0.6rem;">
        More sensor power resolves asteroids sooner, so Weapons can target them earlier.
        The pulse lights up every contact at once (long cooldown).</p>
      <button id="pulse-btn" style="width:100%">Sensor Pulse</button>
    </div>

    <!-- (Breakers now live inline on each power row above; hull/shield vitals
         live on the main screen — no duplicates here.) -->
  </main>

  <!-- Phase overlays (shared shell fills these in) -->
  <div class="overlay hidden" id="lobby-overlay">
    <h2>Standing By</h2>
    <p id="lobby-crew" style="color:var(--dim)"></p>
    <button class="primary" id="launch-btn">Launch Mission</button>
  </div>
  <div class="overlay hidden" id="debrief-overlay">
    <h2 id="debrief-title">Mission Debrief</h2>
    <div class="grade" id="debrief-grade"></div>
    <p id="debrief-narrative" style="max-width:26rem"></p>
    <div class="label" style="margin-top:0.6rem;">Captain's Log</div>
    <div id="debrief-log" class="log" style="max-height: 22vh; width: min(26rem, 88vw); text-align: left;"></div>
    <button class="primary" id="return-btn">Return to Ready Room</button>
  </div>

  <script type="module">
    import { initStation, setHealthBar, mountHelp } from '/js/station.js';
    import { createAudio } from '/js/audio.js';
    import { playFxAudio, readyRoomAmbient } from '/js/fx-audio.js';
    import { createIntents } from '/js/optimistic.js';

    // Console-local audio: engineering hears its own breakers (trip / arm / tap
    // / re-power), power reallocation clicks, and — routed off the main screen —
    // sensor contacts + the active sensor pulse.
    const audio = createAudio();
    for (const ev of ['pointerdown', 'keydown', 'touchstart']) window.addEventListener(ev, () => audio.resume());
    const ENGINEERING_FX = new Set(['sensorContact', 'sensorPulse', 'ionStorm']);
    const prevBreakers = { engines: false, shields: false, weapons: false, sensors: false };
    // Per-system restore-gesture progress (armed via the slider, then 3 taps).
    const RESTORE_TAPS = 3;
    const restore = { engines: null, shields: null, weapons: null, sensors: null };

    // Four powered systems. Sensors are engineering-powered but operated at the
    // weapons scope; the tractor now draws from WEAPONS power (shared emitter).
    const SYSTEMS = ['engines', 'shields', 'weapons', 'sensors'];
    const POWER_MAX = 4;
    const POWER_TOTAL = 7; // keep in sync with POWER_TOTAL in src/engine/game.ts

    // Build each power row once; render() updates state. The row holds BOTH the
    // pip controls (− on the LEFT, then label+pips, then +) and its breaker
    // restore (hidden until this system trips, then shown in place).
    const systemsEl = document.getElementById('power-systems');
    for (const sys of SYSTEMS) {
      const row = document.createElement('div');
      row.className = 'pwr-row';
      row.id = `row-${sys}`;
      row.innerHTML = `
        <div class="pwr-controls">
          <button class="pwr-btn" data-sys="${sys}" data-delta="-1">&minus;</button>
          <div class="pwr-mid"><div class="label">${sys}</div><div class="pips" id="pips-${sys}">
            ${Array.from({ length: POWER_MAX }, () => '<div class="pip"></div>').join('')}
          </div></div>
          <button class="pwr-btn" data-sys="${sys}" data-delta="1">+</button>
        </div>
        <div class="brk-restore" id="brk-${sys}">
          <div class="brk-label">${sys}: TRIPPED — HALF POWER</div>
          <input type="range" class="brk-slider" min="0" max="100" value="0" aria-label="Slide to arm ${sys} breaker">
          <button class="brk-tap" disabled>Slide to arm</button>
        </div>`;
      systemsEl.appendChild(row);
    }

    // Reset a breaker's restore gesture back to the start (slider left, no taps).
    function resetGesture(sys) {
      restore[sys] = { armed: false, taps: 0 };
      const brk = document.getElementById(`brk-${sys}`);
      brk.querySelector('.brk-slider').value = 0;
      const tap = brk.querySelector('.brk-tap');
      tap.disabled = true;
      tap.textContent = 'Slide to arm';
    }
    for (const sys of SYSTEMS) resetGesture(sys);

    const intents = createIntents();
    let lastPower = { engines: 0, shields: 0, weapons: 0, sensors: 0 }; // latest authoritative allocation
    let lastBreakers = { engines: false, shields: false, weapons: false, sensors: false };

    // The commanded allocation: optimistic intent if pending, else the snapshot.
    const shownPower = (sys) => intents.get(`power-${sys}`) ?? lastPower[sys];

    // Paint one system's pip row (+ the spare counter). Called from render()
    // on every snapshot AND directly from the +/- click handler so a tap
    // lands visually before the next broadcast.
    function paintPips(sys) {
      const tripped = intents.has(`brk-${sys}`) ? false : lastBreakers[sys];
      const pips = document.querySelectorAll(`#pips-${sys} .pip`);
      pips.forEach((p, i) => {
        p.classList.toggle('on', !tripped && i < shownPower(sys));
        p.classList.toggle('tripped', tripped && i < shownPower(sys));
      });
      const used = SYSTEMS.reduce((sum, s) => sum + shownPower(s), 0);
      document.getElementById('power-free').textContent = `${POWER_TOTAL - used} spare`;
    }

    const net = initStation({
      seat: 'engineering',
      intents,
      render(state) {
        // Engineering-local SFX from the fx stream (sensor contacts + pulse).
        playFxAudio(state.fx, audio, ENGINEERING_FX);
        readyRoomAmbient(audio, state.phase); // soft lobby bed while standing by
        lastPower = state.power;
        for (const sys of SYSTEMS) {
          lastBreakers[sys] = !!state.breakers[sys];
          // Pips render the COMMANDED allocation; a tripped system limps at
          // HALF power, so allocated pips stay visible but hollow (see
          // .pip.tripped) — "still allocated, not fully functioning". The
          // optimistic breaker-restore intent paints it healthy immediately.
          paintPips(sys);
          const tripped = intents.has(`brk-${sys}`) ? false : !!state.breakers[sys];
          // Sound the transition (trip vs re-power) once, off the state edge, and
          // reset the restore gesture when a breaker newly trips or finally clears.
          if (tripped && !prevBreakers[sys]) { audio.breakerTrip(); resetGesture(sys); }
          else if (!tripped && prevBreakers[sys]) { audio.breakerReset(); resetGesture(sys); }
          prevBreakers[sys] = tripped;
          // The row shows its breaker restore (in place of the pip controls) while tripped.
          document.getElementById(`row-${sys}`).classList.toggle('tripped', tripped);
        }
        // Sensors: current detection range + pulse cooldown. An ion storm
        // halves the range — flag it loudly, this console owns the response.
        const rangeEl = document.getElementById('sensor-range');
        rangeEl.textContent = state.ionStormIn > 0
          ? `${Math.round(state.sensorRange)}s range — ION STORM ${Math.ceil(state.ionStormIn)}s`
          : `${Math.round(state.sensorRange)}s range`;
        rangeEl.style.color = state.ionStormIn > 0 ? 'var(--bad)' : 'var(--accent)';
        const pulseBtn = document.getElementById('pulse-btn');
        const pulseReady = state.sensorPulseReadyIn <= 0;
        pulseBtn.disabled = !pulseReady;
        pulseBtn.textContent = pulseReady ? 'Sensor Pulse' : `Pulse ready in ${Math.ceil(state.sensorPulseReadyIn)}s`;
      },
    });

    // Sensor pulse button.
    document.getElementById('pulse-btn').addEventListener('click', () => net.action({ kind: 'sensorPulse' }));

    // Power presets (P#11): one saved split, save + load. Load applies on the
    // next snapshot (the server re-allocates), so no optimistic paint needed.
    document.getElementById('preset-save').addEventListener('click', () => { net.action({ kind: 'savePreset' }); audio.powerClick(); });
    document.getElementById('preset-load').addEventListener('click', () => { net.action({ kind: 'loadPreset' }); audio.powerClick(); });

    // Console tutorial (the "?" in the header): a schematic of the controls
    // plus plain-language notes, readable from the lobby before launch.
    mountHelp({
      title: 'Engineering — you run the power grid',
      diagram: `
        <svg viewBox="0 0 340 130" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="8.5">
          <!-- power pips: four systems, moveable points -->
          ${['ENGINES', 'SHIELDS', 'WEAPONS', 'SENSORS'].map((n, row) => `
            <text x="14" y="${18 + row * 20}" fill="#7d8db3">${n}</text>
            ${[0, 1, 2, 3].map((i) => `<rect x="${70 + i * 18}" y="${9 + row * 20}" width="13" height="13" rx="3"
                fill="${i < [2, 1, 2, 2][row] ? 'currentColor' : 'none'}" stroke="${i < [2, 1, 2, 2][row] ? 'currentColor' : '#39456b'}"/>`).join('')}
            <text x="150" y="${19 + row * 20}" fill="#7d8db3">−  +</text>`).join('')}
          <text x="96" y="120" fill="#7d8db3" text-anchor="middle">7 POINTS — MOVE THEM WHERE NEEDED</text>
          <!-- breaker restore: slide then tap -->
          <rect x="200" y="12" width="128" height="80" rx="8" fill="none" stroke="#39456b"/>
          <text x="264" y="28" fill="#ff6f6f" text-anchor="middle">BREAKER TRIPPED</text>
          <rect x="212" y="38" width="104" height="10" rx="5" fill="none" stroke="#39456b"/>
          <circle cx="302" cy="43" r="9" fill="currentColor"/>
          <text x="264" y="64" fill="#7d8db3" text-anchor="middle">1. SLIDE →</text>
          <text x="264" y="80" fill="#7d8db3" text-anchor="middle">2. TAP ×3 = FIXED</text>
        </svg>`,
      lines: [
        'You have <b>7 power points</b> across four systems (max 4 each). Moving them is your main job.',
        '<b>Engines</b> = speed and turning. <b>Weapons</b> = laser recharge rate (and it feeds the tractor beam). <b>Sensors</b> = how early contacts are detected AND identified. <b>Shields</b> = shield recharge (only while lowered).',
        '<b>Breakers</b> trip when rocks hit the hull. When a system trips, its power row turns into the restore control — slide to arm, then tap 3 times. A tripped system runs at half power until restored.',
        'The <b>Sensor Pulse</b> reveals AND identifies every contact at once and cuts through ion storms (long cooldown).',
        '<b>Save/Load Preset</b> stashes a power split (e.g. a combat setup) so you can snap back to it in one tap.',
        'Give power to whoever needs it right now — listen to helm, weapons, and the chief.',
      ],
    });

    // Power +/- buttons (soft click on each reallocation). The tap paints the
    // intended allocation immediately; if the server rejects it (pool spent,
    // cap hit) the intent expires after 3 snapshots and the pips revert.
    systemsEl.addEventListener('click', (ev) => {
      const btn = ev.target.closest('button[data-sys]');
      if (!btn) return;
      const sys = btn.dataset.sys;
      const delta = Number(btn.dataset.delta);
      // Client-side pool guard: adding power when the pool is already fully
      // spent must not light a pip or flash "-1 spare" before the server rejects
      // it. Block the +tap entirely when there's no spare (per-system cap is
      // checked below). The server stays authoritative; this is purely UI.
      const used = SYSTEMS.reduce((sum, s) => sum + shownPower(s), 0);
      if (delta > 0 && used >= POWER_TOTAL) return;
      net.action({ kind: 'power', system: sys, delta });
      audio.powerClick();
      const next = shownPower(sys) + delta;
      if (next >= 0 && next <= POWER_MAX) {
        intents.set(`power-${sys}`, next, (s) => s.power[sys] === next);
        paintPips(sys); // land the tap visually before the next broadcast
      }
    });

    // Two-step breaker restore. Step 1: drag the slider fully right to ARM.
    systemsEl.addEventListener('input', (ev) => {
      const slider = ev.target.closest('.brk-slider');
      if (!slider) return;
      const brk = slider.closest('.brk-restore');
      const sys = brk.id.slice(4);
      const g = restore[sys];
      if (!g || g.armed) return;
      if (Number(slider.value) >= 100) {
        g.armed = true;
        const tap = brk.querySelector('.brk-tap');
        tap.disabled = false;
        tap.textContent = `Tap ${RESTORE_TAPS}× to restore (0/${RESTORE_TAPS})`;
        audio.breakerArm();
      }
    });
    // Step 2: tap three times to re-power. The final tap sends resetBreaker; the
    // widget waits on the server to actually clear the breaker (render resets it).
    systemsEl.addEventListener('click', (ev) => {
      const tap = ev.target.closest('.brk-tap');
      if (!tap || tap.disabled) return;
      const brk = tap.closest('.brk-restore');
      const sys = brk.id.slice(4);
      const g = restore[sys];
      if (!g || !g.armed) return;
      g.taps++;
      audio.breakerTick();
      if (g.taps >= RESTORE_TAPS) {
        net.action({ kind: 'resetBreaker', system: sys });
        // Optimistic: paint the breaker healthy right now; the render loop
        // reads this intent, and the reset SFX plays off the visual edge.
        intents.set(`brk-${sys}`, false, (s) => !s.breakers[sys]);
        tap.disabled = true;
        tap.textContent = 'Restoring…';
      } else {
        tap.textContent = `Tap ${RESTORE_TAPS}× to restore (${g.taps}/${RESTORE_TAPS})`;
      }
    });
  </script>
</body>
</html>
