<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Weapons Station</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>:root { --accent: #ff6f6f; }</style>
</head>
<body>
  <header>
    <h1>Weapons</h1>
    <span class="room-code"></span>
    <span class="conn-dot"></span>
  </header>
  <div id="toasts"></div>

  <main>
    <!-- Incoming asteroid contacts: radar scope, tap a blip to target it -->
    <div class="panel">
      <h2>Sensor Contacts</h2>
      <div id="scope-mount" style="width:100%; aspect-ratio:1; max-width:320px; margin:0 auto;"></div>
      <p id="scope-empty" style="color:var(--dim); text-align:center; margin-top:0.5rem">No contacts.</p>
      <p id="scope-target" style="text-align:center; margin-top:0.5rem"></p>
    </div>

    <!-- Weapon charge and fire control -->
    <div class="panel">
      <h2>Phaser Bank</h2>
      <div class="label">Charge</div>
      <div class="meter" style="margin-bottom:0.75rem"><div id="charge-bar"></div></div>
      <button class="primary" id="fire-btn" style="width:100%">FIRE</button>
      <!-- Charge governor (P#10): STANDARD full-power shots vs SNAPSHOT quick
           weak shots (fire at 40%, small contacts only) — your call on pacing. -->
      <div class="label" style="margin:0.7rem 0 0.3rem;">Fire Mode</div>
      <div class="row">
        <button id="gov-standard" class="gov-btn">STANDARD</button>
        <button id="gov-snapshot" class="gov-btn">SNAPSHOT</button>
      </div>
      <p class="label" id="gov-hint" style="margin-top:0.4rem;"></p>
    </div>

    <!-- Deflector screen (renamed from "shields" so it stops colliding with
         Engineering's "shield power" callout — playtest note). Regen rate
         depends on engineering's shield power allocation. -->
    <div class="panel">
      <h2>Deflector Screen</h2>
      <div class="label">Strength</div>
      <div class="meter" style="margin-bottom:0.75rem"><div id="shield-bar"></div></div>
      <button id="shields-btn" style="width:100%">Screen Up</button>
    </div>

    <!-- Tractor / tow (shares the phaser emitter): aim + latch a pod/salvage.
         The laser is offline while latched — your call. -->
    <div id="tow-widgets"></div>
  </main>

  <!-- Phase overlays (shared shell fills these in) -->
  <div class="overlay hidden" id="lobby-overlay">
    <h2>Standing By</h2>
    <p id="lobby-crew" style="color:var(--dim)"></p>
    <button class="primary" id="launch-btn">Launch Mission</button>
  </div>
  <div class="overlay hidden" id="debrief-overlay">
    <h2 id="debrief-title">Mission Debrief</h2>
    <div class="grade" id="debrief-grade"></div>
    <p id="debrief-narrative" style="max-width:26rem"></p>
    <div class="label" style="margin-top:0.6rem;">Captain's Log</div>
    <div id="debrief-log" class="log" style="max-height: 22vh; width: min(26rem, 88vw); text-align: left;"></div>
    <button class="primary" id="return-btn">Return to Ready Room</button>
  </div>

  <script type="module">
    import { initStation, setHealthBar, setChargeBar, mountHelp } from '/js/station.js';
    import { mountPhaser } from '/js/phaser-station.js';
    import { WeaponsScopeScene } from '/js/weapons-scope.js';
    import { createAudio } from '/js/audio.js';
    import { playFxAudio, readyRoomAmbient } from '/js/fx-audio.js';
    import { createIntents } from '/js/optimistic.js';
    import { mountWidgets } from '/js/widget.js';
    import { towBeam } from '/js/widgets/tow.js';

    // Console-local audio: weapons hears its own laser, target lock, fire-ready
    // chime, and shields raise/lower. The laser is deliberately NOT on the main
    // screen — it fires from here.
    const audio = createAudio();
    for (const ev of ['pointerdown', 'keydown', 'touchstart']) window.addEventListener(ev, () => audio.resume());
    const WEAPONS_FX = new Set(['laser', 'tractorBeam']);
    let towHost = null;
    let prevShieldsRaised = false;
    let prevTargetId = null;
    let prevReady = false;

    const scopeEmptyEl = document.getElementById('scope-empty');
    const scopeTargetEl = document.getElementById('scope-target');
    const fireBtn = document.getElementById('fire-btn');
    const shieldsBtn = document.getElementById('shields-btn');
    let shieldsRaised = false;

    const scopeScene = new WeaponsScopeScene();
    mountPhaser({ parentId: 'scope-mount', width: 320, height: 320, scene: scopeScene });

    const intents = createIntents();
    const net = initStation({
      seat: 'weapons',
      intents,
      render(state) {
        // The scope scene reads this on its own update loop; tapping a blip
        // calls back here with the id, same action any target-list UI would send.
        scopeScene.onTarget = (id) => { net.action({ kind: 'target', id }); audio.tapTick(); };
        scopeScene.setState(state);
        // Weapons-local SFX: laser (from the fx stream), a lock chime when a new
        // contact is acquired, and a soft chime the moment the bank recharges.
        playFxAudio(state.fx, audio, WEAPONS_FX);
        readyRoomAmbient(audio, state.phase); // soft lobby bed while standing by
        if (state.targetId !== null && state.targetId !== prevTargetId) audio.targetLock();
        prevTargetId = state.targetId;
        const chargeReady = state.charge >= 100;
        if (chargeReady && !prevReady) audio.fireReady();
        prevReady = chargeReady;
        // Trigger the pulse sweep animation when engineering fires a pulse.
        if ((state.fx || []).some((e) => e.kind === 'sensorPulse')) scopeScene.pulse();
        // Only sensor-resolved contacts show on the scope, so the empty message
        // tracks how many are actually targetable.
        const acquirable = state.asteroids.filter((a) => a.targetable);
        scopeEmptyEl.style.display = acquirable.length === 0 ? '' : 'none';
        const targeted = state.asteroids.find((a) => a.id === state.targetId);
        // Scope shows the contact name + its resolved kind (UNKNOWN until sensors
        // identify it). Threat/speed data lives on the main screen so the captain
        // can call priorities. A locked-on rescue POD reads as a HOLD-FIRE warning.
        const kindLabel = targeted ? (targeted.identified ? targeted.kind.toUpperCase() : 'UNKNOWN') : '';
        const isPod = targeted && targeted.identified && targeted.kind === 'pod';
        scopeTargetEl.innerHTML = targeted
          ? (isPod
              ? `<b style="color:var(--bad)">${targeted.label}: RESCUE POD — HOLD FIRE</b>`
              : `Targeting ${targeted.label} <span class="label">${kindLabel}</span>`)
          : '';

        // Governor: SNAPSHOT fires at 40% (small contacts only), STANDARD at 100%.
        const gov = intents.get('governor') ?? state.governor ?? 'standard';
        const needed = gov === 'snapshot' ? 40 : 100;
        document.getElementById('gov-standard').classList.toggle('on', gov === 'standard');
        document.getElementById('gov-snapshot').classList.toggle('on', gov === 'snapshot');
        document.getElementById('gov-hint').textContent = gov === 'snapshot'
          ? 'Snapshot: fire at 40% — only cracks small rocks.'
          : 'Standard: wait for full charge, full damage.';

        // Charge is the laser recharge meter — firable at the governor threshold.
        // A just-tapped FIRE renders as drained immediately (optimistic flash)
        // even though the server won't echo the empty meter for a tick.
        const charge = intents.has('fired') ? 0 : state.charge;
        const ready = charge >= needed;
        setChargeBar(document.getElementById('charge-bar'), charge, ready);
        // Never let the gunner fire on a confirmed pod (the don't-shoot invariant
        // is enforced server-side too, but the UI refuses it and says why).
        fireBtn.disabled = !ready || state.targetId === null || isPod;
        fireBtn.textContent = isPod
          ? 'HOLD FIRE — RESCUE POD'
          : !ready
            ? (gov === 'snapshot' ? 'CHARGING (40%)…' : 'CHARGING…')
            : state.targetId === null ? 'FIRE (select a target)' : (gov === 'snapshot' ? 'SNAPSHOT' : 'FIRE');
        // Deflector-screen toggle: prefer the just-commanded value (optimistic)
        // over the snapshot; the audio edge detector stays on authoritative state.
        if (state.shields.raised && !prevShieldsRaised) audio.shieldUp();
        else if (!state.shields.raised && prevShieldsRaised) audio.shieldDown();
        prevShieldsRaised = state.shields.raised;
        shieldsRaised = intents.get('shields') ?? state.shields.raised;
        shieldsBtn.textContent = shieldsRaised ? 'Screen Down' : 'Screen Up';
        setHealthBar(document.getElementById('shield-bar'), state.shields.strength);
        if (towHost) towHost.render(state);
      },
    });

    // Tractor/tow widget (shares the emitter — the gunner's own tow control).
    towHost = mountWidgets(
      document.getElementById('tow-widgets'),
      [towBeam],
      { net, intents, audio, seat: 'weapons' },
    );

    // Governor mode buttons.
    document.getElementById('gov-standard').addEventListener('click', () => {
      net.action({ kind: 'governor', mode: 'standard' });
      intents.set('governor', 'standard', (s) => s.governor === 'standard');
    });
    document.getElementById('gov-snapshot').addEventListener('click', () => {
      net.action({ kind: 'governor', mode: 'snapshot' });
      intents.set('governor', 'snapshot', (s) => s.governor === 'snapshot');
    });

    fireBtn.addEventListener('click', () => {
      net.action({ kind: 'fire' });
      audio.trigger(); // dry local trigger click; the zap follows via fx
      // Optimistic: drain the meter and disable the button right now — the
      // server's own drained charge arrives next tick and takes over.
      intents.flash('fired', 2);
      setChargeBar(document.getElementById('charge-bar'), 0, false);
      fireBtn.disabled = true;
      fireBtn.textContent = 'CHARGING…';
    });
    shieldsBtn.addEventListener('click', () => {
      const want = !shieldsRaised;
      net.action({ kind: 'shields', raised: want });
      // Optimistic: flip the button label instantly; reconciled when the
      // snapshot's shields.raised matches (or reverts after 3 snapshots).
      intents.set('shields', want, (s) => s.shields.raised === want);
      shieldsRaised = want;
      shieldsBtn.textContent = want ? 'Lower Shields' : 'Raise Shields';
    });

    // Console tutorial (the "?" in the header): a schematic of the controls
    // plus plain-language notes, readable from the lobby before launch.
    mountHelp({
      title: 'Weapons — you defend the ship',
      diagram: `
        <svg viewBox="0 0 340 130" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="9">
          <!-- radar scope with a blip and a tap -->
          <circle cx="70" cy="62" r="50" fill="none" stroke="#39456b"/>
          <circle cx="70" cy="62" r="30" fill="none" stroke="#39456b" stroke-dasharray="3 4"/>
          <circle cx="70" cy="62" r="4" fill="currentColor"/>
          <circle cx="99" cy="40" r="7" fill="#7d8db3"/>
          <circle cx="99" cy="40" r="13" fill="none" stroke="currentColor"/>
          <text x="99" y="24" fill="#7d8db3" text-anchor="middle">1. TAP = TARGET</text>
          <text x="70" y="124" fill="#7d8db3" text-anchor="middle">ROCKS SHOW WHEN SENSORS SEE THEM</text>
          <!-- charge meter + fire -->
          <rect x="160" y="30" width="120" height="12" rx="6" fill="none" stroke="#39456b"/>
          <rect x="160" y="30" width="120" height="12" rx="6" fill="currentColor" opacity="0.85"/>
          <text x="220" y="24" fill="#7d8db3" text-anchor="middle">CHARGE (FULL = READY)</text>
          <rect x="185" y="50" width="70" height="22" rx="5" fill="none" stroke="currentColor" stroke-width="2"/>
          <text x="220" y="65" fill="currentColor" text-anchor="middle">2. FIRE</text>
          <!-- shield arc -->
          <path d="M175 108 Q220 84 265 108" fill="none" stroke="#78c8ff" stroke-width="3"/>
          <text x="220" y="122" fill="#7d8db3" text-anchor="middle">SHIELDS: BLOCK HITS, DRAIN WHILE UP</text>
        </svg>`,
      lines: [
        '<b>Tap a blip</b> on the scope to target it. Press <b>FIRE</b> when the charge bar is full. Shots always hit.',
        '<b>Fire Mode</b>: STANDARD waits for a full charge and full damage. <b>SNAPSHOT</b> fires at 40% for a quick weak shot that only cracks small rocks — trade firepower for less waiting.',
        'Contacts read <b>UNKNOWN</b> until sensors identify them. A <b>RESCUE POD</b> looks like a rock at range — <b>never fire on a pod</b> (the console will refuse it). Confirm before you shoot.',
        'The laser <b>recharges faster with more weapon power</b>. The <b>tractor beam</b> shares your emitter: latch a pod/salvage in the arc to reel it in — but the <b>laser is offline while latched</b>, so it\'s a "tow or shoot?" call. Weapons power drives both.',
        'The <b>deflector screen</b> blocks damage but drains while up, and only recharges while down.',
        'The <b>captain</b> reads speed and threat on the main screen and calls priorities.',
      ],
    });
  </script>
</body>
</html>
