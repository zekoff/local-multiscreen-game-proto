<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Weapons Station</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    :root { --accent: #ff6f6f; }
    /* Weapons grid: scope big, laser + tractor side by side, deflector below.
       Phone = one screen, no scroll. Large screen widens + reveals deco chrome. */
    main.weapons {
      grid-template-columns: 1fr 1fr;
      grid-template-areas:
        "scope scope"
        "bank  tractor"
        "deflector deflector";
    }
    main.weapons #scope-mount { max-width: none; }
    /* Tractor cell always fills (candidate list flex-grows), so it doesn't jump
       in size when pods/salvage appear or clear. */
    main.weapons #tow-widgets .widget.panel { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    main.weapons .tractor-candidates { flex: 1; min-height: 3.2rem; overflow: hidden; }
    /* Button differentiation within the red theme: FIRE + STANDARD stay red,
       SNAPSHOT reads amber (quick/partial), the tractor Latch reads teal (beam). */
    main.weapons #gov-snapshot.on { background: var(--warn); border-color: var(--warn); color: #06090f; }
    main.weapons #tow-widgets button.primary { background: #123230; border-color: #3fd6c8; color: #86ecdd; }
    main.weapons #tow-widgets button.primary:active { background: #3fd6c8; color: #06181a; }
    @media (min-width: 860px) and (min-height: 620px) {
      main.weapons {
        grid-template-columns: 1.5fr 1fr 1fr;
        /* Functional + decorative interleaved (not all-functional-then-deco). */
        grid-template-areas:
          "scope bank      tractor"
          "scope deco3     tractor"
          "deco1 deflector deco2";
      }
    }
    /* CRUISE: the CPU owns the scope, so the Phaser Bank (fire + governor) is
       gone entirely and the player's two remaining jobs — deflector and tractor —
       take the space. The scope still renders: watching it is the point. */
    main.weapons.mode-cruise #bank-panel { display: none; }
    main.weapons.mode-cruise {
      grid-template-areas:
        "scope     scope"
        "deflector tractor";
    }
    @media (min-width: 860px) and (min-height: 620px) {
      main.weapons.mode-cruise {
        grid-template-areas:
          "scope deflector tractor"
          "scope deco3     tractor"
          "deco1 deco2     deco2";
      }
    }
    /* Auto-track banner on the scope: states plainly that fire control is on CPU. */
    .auto-track { color: var(--good); font-size: 0.78rem; letter-spacing: 0.08em; }
  </style>
</head>
<body>
  <header>
    <h1>Weapons</h1>
    <span class="room-code"></span>
    <span class="conn-dot"></span>
  </header>
  <div id="toasts"></div>

  <main class="console weapons">
    <!-- Incoming asteroid contacts: radar scope, tap a blip to target it.
         Kept the biggest element (sensor: bigger is better). -->
    <div class="panel" style="grid-area:scope; display:flex; flex-direction:column;">
      <h2>Sensor Contacts <span id="scope-mode" class="auto-track"></span></h2>
      <div id="scope-mount" style="flex:1; min-height:0; width:100%; aspect-ratio:9 / 5; margin:0 auto;"></div>
      <p id="scope-empty" style="color:var(--dim); text-align:center; margin-top:0.3rem">No contacts.</p>
      <p id="scope-target" style="text-align:center; margin-top:0.3rem"></p>
    </div>

    <!-- Weapon charge and fire control -->
    <div class="panel" id="bank-panel" style="grid-area:bank">
      <h2>Phaser Bank</h2>
      <p class="label" id="wpn-power" style="margin-bottom:0.35rem"></p>
      <div class="meter" style="margin-bottom:0.55rem; position:relative"><div id="charge-bar"></div><div id="snap-tick"></div></div>
      <button class="primary" id="fire-btn" style="width:100%">FIRE</button>
      <div class="row" style="margin-top:0.5rem">
        <button id="gov-standard" class="gov-btn">STANDARD</button>
        <button id="gov-snapshot" class="gov-btn">SNAPSHOT</button>
      </div>
      <p class="label" id="gov-hint" style="margin-top:0.35rem;"></p>
    </div>

    <!-- Tractor / tow — managed alongside the laser (independent; tow AND fire). -->
    <div id="tow-widgets" style="grid-area:tractor; display:flex; flex-direction:column;"></div>

    <!-- Deflector screen (regen rate depends on engineering's shield power). -->
    <div class="panel" style="grid-area:deflector">
      <h2>Deflector Screen</h2>
      <p class="label" id="shd-power" style="margin-bottom:0.35rem"></p>
      <div class="meter" style="margin-bottom:0.55rem"><div id="shield-bar"></div></div>
      <button id="shields-btn" style="width:100%">Screen Up</button>
    </div>

    <!-- Decorative chrome: shown only on large screens, hidden on phones.
         Live data — charge history, real readouts, real bridge status, and the
         console's own toasts. -->
    <div class="panel large-only graph-panel" style="grid-area:deco1">
      <h2>Emitter Load</h2>
      <div class="deco-legend">
        <span><i style="color:var(--accent)"></i>charge</span>
        <span><i style="color:#4f7bd0"></i>emitter pwr</span>
        <span><i style="color:#ff6f6f"></i>capacitor</span>
        <span><i style="color:#6ad39a"></i>track jitter</span>
      </div>
      <svg id="wpn-graph" class="deco-graph" viewBox="0 0 120 44" preserveAspectRatio="none">
        <polyline fill="none" stroke="var(--accent)" stroke-width="2.4" opacity="0.9" vector-effect="non-scaling-stroke" points=""/>
        <polyline fill="none" stroke="#4f7bd0" stroke-width="2.4" opacity="0.75" vector-effect="non-scaling-stroke" points=""/>
        <polyline fill="none" stroke="#ff6f6f" stroke-width="1" opacity="0.5" vector-effect="non-scaling-stroke" points=""/>
        <polyline fill="none" stroke="#6ad39a" stroke-width="1.1" opacity="0.5" vector-effect="non-scaling-stroke" points=""/>
      </svg>
      <div class="deco-stat"><span>charge</span><b id="wpn-charge">—</b></div>
      <div class="deco-stat"><span>coil temp</span><b id="wpn-temp">—</b></div>
    </div>
    <div class="panel large-only" style="grid-area:deco2">
      <h2>Tactical Log</h2>
      <div id="wpn-tac-log" class="deco-log"></div>
    </div>
    <div class="panel large-only" style="grid-area:deco3">
      <h2>Bridge Status</h2>
      <div id="wpn-crew" class="deco-crew"></div>
    </div>
  </main>

  <!-- Phase overlays (shared shell fills these in) -->
  <div class="overlay hidden" id="lobby-overlay">
    <h2>Standing By</h2>
    <p id="lobby-crew" style="color:var(--dim)"></p>
    <button class="primary" id="launch-btn">Launch Mission</button>
  </div>
  <div class="overlay hidden" id="debrief-overlay">
    <h2 id="debrief-title">Mission Debrief</h2>
    <div class="grade" id="debrief-grade"></div>
    <p id="debrief-narrative" style="max-width:26rem"></p>
    <div class="label" style="margin-top:0.6rem;">Captain's Log</div>
    <div id="debrief-log" class="log" style="max-height: 22vh; width: min(26rem, 88vw); text-align: left;"></div>
    <button class="primary" id="return-btn">Return to Ready Room</button>
  </div>

  <script type="module">
    import { initStation, setHealthBar, setChargeBar, mountHelp } from '/js/station.js';
    import { mountPhaser } from '/js/phaser-station.js';
    import { WeaponsScopeScene } from '/js/weapons-scope.js';
    import { createAudio } from '/js/audio.js';
    import { playFxAudio, readyRoomAmbient } from '/js/fx-audio.js';
    import { createIntents } from '/js/optimistic.js';
    import { mountWidgets } from '/js/widget.js';
    import { towBeam } from '/js/widgets/tow.js';
    import { spark, makeSignal, renderCrew, tacticalLog } from '/js/deco.js';

    // Live decorative chrome (large screens): charge history, bridge status, and
    // a tactical log of this console's own toasts + ambient flavor.
    const wpnGraph = spark(document.getElementById('wpn-graph'), { lo: 0, hi: 100 });
    // Two extra traces have no real datum: a spiky "capacitor" bank (mostly low,
    // occasional discharge spikes) and a gently-beating "track jitter".
    const wpnCap = makeSignal('pulse', { base: 22, amp: 70 });
    const wpnTrack = makeSignal('wave2', { base: 50, amp: 34, period: 7 });
    const wpnCrewEl = document.getElementById('wpn-crew');
    const wpnLog = tacticalLog(document.getElementById('wpn-tac-log'), [
      'emitter coils nominal', 'targeting bus clear', 'deflector lattice synced',
      'fire-control online', 'capacitor bank charged',
    ]);

    // Console-local audio: weapons hears its own laser, target lock, fire-ready
    // chime, and shields raise/lower. The laser is deliberately NOT on the main
    // screen — it fires from here.
    const audio = createAudio();
    for (const ev of ['pointerdown', 'keydown', 'touchstart']) window.addEventListener(ev, () => audio.resume());
    const WEAPONS_FX = new Set(['laser', 'tractorBeam']);
    let towHost = null;
    let prevShieldsRaised = false;
    let prevTargetId = null;
    let prevReady = false;

    const consoleEl = document.querySelector('main.weapons'); // carries the mode-cruise class
    const scopeEmptyEl = document.getElementById('scope-empty');
    const scopeTargetEl = document.getElementById('scope-target');
    const fireBtn = document.getElementById('fire-btn');
    const shieldsBtn = document.getElementById('shields-btn');
    let shieldsRaised = false;

    const scopeScene = new WeaponsScopeScene();
    mountPhaser({ parentId: 'scope-mount', width: 360, height: 200, scene: scopeScene });

    const intents = createIntents();
    const net = initStation({
      seat: 'weapons',
      intents,
      onToast: (text) => wpnLog.push(text), // capture this console's toasts into the tactical log
      render(state) {
        // Live deco (cheap; the panels are hidden on phones): charge history +
        // real coil-temp derived from charge, real bridge status, ambient log.
        // Traces: real charge + real emitter power + synthetic capacitor / track jitter.
        wpnGraph(state.charge ?? 0, (state.power.weapons ?? 0) * 25, wpnCap(), wpnTrack());
        document.getElementById('wpn-charge').textContent = `${Math.round(state.charge ?? 0)}%`;
        document.getElementById('wpn-temp').textContent = `${Math.round(360 + (state.charge ?? 0) * 0.85)} K`;
        renderCrew(wpnCrewEl, state, 'weapons');
        wpnLog.tick(state.missionTime ?? 0);
        // Cruise hands the SCOPE to the CPU (the engine ignores target/fire/
        // governor from this seat). The scope keeps rendering — situational
        // awareness is the whole point — but it stops taking taps, and the fire
        // control panel is hidden entirely. Deflector + tractor stay the player's.
        const autoScope = !!(state.aids && state.aids.autoScope);
        consoleEl.classList.toggle('mode-cruise', autoScope);
        document.getElementById('scope-mode').textContent = autoScope ? '— AUTO-TRACK' : '';
        // The scope scene reads this on its own update loop; tapping a blip
        // calls back here with the id, same action any target-list UI would send.
        scopeScene.onTarget = autoScope ? null : (id) => { net.action({ kind: 'target', id }); audio.tapTick(); };
        scopeScene.setState(state);
        // Weapons-local SFX: laser (from the fx stream), a lock chime when a new
        // contact is acquired, and a soft chime the moment the bank recharges.
        playFxAudio(state.fx, audio, WEAPONS_FX);
        readyRoomAmbient(audio, state.phase); // soft lobby bed while standing by
        if (state.targetId !== null && state.targetId !== prevTargetId) audio.targetLock();
        prevTargetId = state.targetId;
        const chargeReady = state.charge >= 100;
        if (chargeReady && !prevReady) audio.fireReady();
        prevReady = chargeReady;
        // Trigger the pulse sweep animation when engineering fires a pulse.
        if ((state.fx || []).some((e) => e.kind === 'sensorPulse')) scopeScene.pulse();
        // Only sensor-resolved contacts show on the scope, so the empty message
        // tracks how many are actually targetable.
        const acquirable = state.asteroids.filter((a) => a.targetable);
        scopeEmptyEl.style.display = acquirable.length === 0 ? '' : 'none';
        const targeted = state.asteroids.find((a) => a.id === state.targetId);
        // Scope shows the contact name + its resolved kind (UNKNOWN until sensors
        // identify it). Threat/speed data lives on the main screen so the captain
        // can call priorities. A locked-on rescue POD reads as a HOLD-FIRE warning.
        const kindLabel = targeted ? (targeted.identified ? targeted.kind.toUpperCase() : 'UNKNOWN') : '';
        const isPod = targeted && targeted.identified && targeted.kind === 'pod';
        scopeTargetEl.innerHTML = targeted
          ? (isPod
              ? `<b style="color:var(--bad)">${targeted.label}: RESCUE POD — HOLD FIRE</b>`
              : `Targeting ${targeted.label} <span class="label">${kindLabel}</span>`)
          : '';

        // Governor: SNAPSHOT fires at 40% (small contacts only), STANDARD at 100%.
        const gov = intents.get('governor') ?? state.governor ?? 'standard';
        const needed = gov === 'snapshot' ? 40 : 100;
        document.getElementById('gov-standard').classList.toggle('on', gov === 'standard');
        document.getElementById('gov-snapshot').classList.toggle('on', gov === 'snapshot');
        document.getElementById('gov-hint').textContent = gov === 'snapshot'
          ? 'Snapshot: fire at 40% — only cracks small rocks.'
          : 'Standard: wait for full charge, full damage.';

        // Charge is the laser recharge meter — firable at the governor threshold.
        // A just-tapped FIRE renders as drained immediately (optimistic flash)
        // even though the server won't echo the empty meter for a tick.
        const charge = intents.has('fired') ? 0 : state.charge;
        const ready = charge >= needed;
        setChargeBar(document.getElementById('charge-bar'), charge, ready);
        // Snapshot tick: mark the 40% threshold on the gauge in SNAPSHOT mode so
        // the gunner can see at a glance when a quick shot is available. Green
        // once the meter has crossed it.
        const snapTick = document.getElementById('snap-tick');
        snapTick.style.display = gov === 'snapshot' ? 'block' : 'none';
        snapTick.style.background = charge >= 40 ? 'var(--good)' : 'rgba(255,255,255,0.55)';
        // The tractor is independent of the laser now — firing is never blocked by
        // an active tow. Never let the gunner fire on a confirmed pod (the
        // don't-shoot invariant is enforced server-side too; the UI refuses it).
        fireBtn.disabled = !ready || state.targetId === null || isPod;
        fireBtn.textContent = isPod
          ? 'HOLD FIRE — RESCUE POD'
          : !ready
            ? (gov === 'snapshot' ? 'CHARGING (40%)…' : 'CHARGING…')
            : state.targetId === null ? 'FIRE (select a target)' : (gov === 'snapshot' ? 'SNAPSHOT' : 'FIRE');
        // Deflector-screen toggle: prefer the just-commanded value (optimistic)
        // over the snapshot; the audio edge detector stays on authoritative state.
        if (state.shields.raised && !prevShieldsRaised) audio.shieldUp();
        else if (!state.shields.raised && prevShieldsRaised) audio.shieldDown();
        prevShieldsRaised = state.shields.raised;
        shieldsRaised = intents.get('shields') ?? state.shields.raised;
        shieldsBtn.textContent = shieldsRaised ? 'Screen Down' : 'Screen Up';
        setHealthBar(document.getElementById('shield-bar'), state.shields.strength);
        if (towHost) towHost.render(state);
        // Inline power readouts: Engineering's allocation shown right where it
        // matters (drives laser recharge + tractor reel, and shield regen), with
        // a NO-POWER call — no separate power panel needed on this console.
        // A trip only halves the system under Officer; under Cruise it costs no
        // performance, so the note must not claim otherwise (see AIDS).
        const brkPen = state.aids ? state.aids.breakerPenalty : 0.5;
        const tripNote = brkPen < 1 ? ' <span style="color:var(--bad)">(breaker ½)</span>' : ' <span style="color:var(--warn)">(breaker out)</span>';
        const wp = state.power.weapons, wTrip = state.breakers.weapons;
        document.getElementById('wpn-power').innerHTML = wp > 0
          ? `Weapon power <b style="color:var(--accent)">${wp}</b>${wTrip ? tripNote : ''} — drives recharge + tractor`
          : '<b style="color:var(--bad)">NO WEAPON POWER</b> — ask Engineering';
        const sp = state.power.shields, sTrip = state.breakers.shields;
        document.getElementById('shd-power').innerHTML = sp > 0
          ? `Shield power <b style="color:var(--accent)">${sp}</b>${sTrip ? tripNote : ''} — regen rate`
          : '<b style="color:var(--bad)">NO SHIELD POWER</b> — regen stalled';
      },
    });

    // Tractor/tow widget (shares the emitter — the gunner's own tow control).
    towHost = mountWidgets(
      document.getElementById('tow-widgets'),
      [towBeam],
      { net, intents, audio, seat: 'weapons' },
    );

    // Governor mode buttons.
    document.getElementById('gov-standard').addEventListener('click', () => {
      net.action({ kind: 'governor', mode: 'standard' });
      intents.set('governor', 'standard', (s) => s.governor === 'standard');
    });
    document.getElementById('gov-snapshot').addEventListener('click', () => {
      net.action({ kind: 'governor', mode: 'snapshot' });
      intents.set('governor', 'snapshot', (s) => s.governor === 'snapshot');
    });

    fireBtn.addEventListener('click', () => {
      net.action({ kind: 'fire' });
      audio.trigger(); // dry local trigger click; the zap follows via fx
      // Optimistic: drain the meter and disable the button right now — the
      // server's own drained charge arrives next tick and takes over.
      intents.flash('fired', 2);
      setChargeBar(document.getElementById('charge-bar'), 0, false);
      fireBtn.disabled = true;
      fireBtn.textContent = 'CHARGING…';
    });
    shieldsBtn.addEventListener('click', () => {
      const want = !shieldsRaised;
      net.action({ kind: 'shields', raised: want });
      // Optimistic: flip the button label instantly; reconciled when the
      // snapshot's shields.raised matches (or reverts after 3 snapshots).
      intents.set('shields', want, (s) => s.shields.raised === want);
      shieldsRaised = want;
      shieldsBtn.textContent = want ? 'Lower Shields' : 'Raise Shields';
    });

    // Console tutorial (the "?" in the header): a schematic of the controls
    // plus plain-language notes, readable from the lobby before launch.
    mountHelp({
      title: 'Weapons — you defend the ship',
      diagram: `
        <svg viewBox="0 0 340 130" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="9">
          <!-- radar scope with a blip and a tap -->
          <circle cx="70" cy="62" r="50" fill="none" stroke="#39456b"/>
          <circle cx="70" cy="62" r="30" fill="none" stroke="#39456b" stroke-dasharray="3 4"/>
          <circle cx="70" cy="62" r="4" fill="currentColor"/>
          <circle cx="99" cy="40" r="7" fill="#7d8db3"/>
          <circle cx="99" cy="40" r="13" fill="none" stroke="currentColor"/>
          <text x="99" y="24" fill="#7d8db3" text-anchor="middle">1. TAP = TARGET</text>
          <text x="70" y="124" fill="#7d8db3" text-anchor="middle">ROCKS SHOW WHEN SENSORS SEE THEM</text>
          <!-- charge meter + fire -->
          <rect x="160" y="30" width="120" height="12" rx="6" fill="none" stroke="#39456b"/>
          <rect x="160" y="30" width="120" height="12" rx="6" fill="currentColor" opacity="0.85"/>
          <text x="220" y="24" fill="#7d8db3" text-anchor="middle">CHARGE (FULL = READY)</text>
          <rect x="185" y="50" width="70" height="22" rx="5" fill="none" stroke="currentColor" stroke-width="2"/>
          <text x="220" y="65" fill="currentColor" text-anchor="middle">2. FIRE</text>
          <!-- shield arc -->
          <path d="M175 108 Q220 84 265 108" fill="none" stroke="#78c8ff" stroke-width="3"/>
          <text x="220" y="122" fill="#7d8db3" text-anchor="middle">SHIELDS: BLOCK HITS, DRAIN WHILE UP</text>
        </svg>`,
      lines: [
        'The scope is a <b>forward arc</b> out the front window — contacts sit where they are relative to your bow (port ↔ starboard) and slide toward you as they close. <b>Tap a blip</b> to target it, then <b>FIRE</b> when charged. Shots always hit.',
        '<b>Fire Mode</b>: STANDARD waits for a full charge and full damage. <b>SNAPSHOT</b> fires at 40% and cracks <b>most</b> rocks fast — but a genuinely <b>big</b> rock shrugs it off and needs a full shot. You can\'t tell size on the scope; the <b>captain</b> calls the big ones from the viewscreen. The gauge tick shows when a snapshot is ready.',
        'Contacts read <b>UNKNOWN</b> until sensors identify them. A <b>RESCUE POD</b> looks like a rock at range — <b>never fire on a pod</b> (the console will refuse it). Confirm before you shoot.',
        'The laser <b>recharges faster with more weapon power</b>. The <b>tractor beam</b> is managed right here alongside the laser and runs <b>independently — you can tow AND fire</b>. Weapon power drives both.',
        'The tractor has <b>no range limit</b> — it reaches as far as sensors do, so the contact list shows <b>everything acquired</b>, nearest first. Rows you can\'t latch yet are greyed with the reason and go live as sensors resolve them. What you DO have to manage is the <b>arc</b>: the contact must be within about 60° of the bow, so ask the <b>helm</b> to bring the nose around and hold the line.',
        'On <b>Cruise</b> the computer runs the scope — targeting and firing are automatic (the panel reads AUTO-TRACK) and your job is the <b>deflector screen</b> and the <b>tractor beam</b>. On <b>Officer</b> you run all of it.',
        'The <b>deflector screen</b> blocks damage but drains while up, and only recharges while down.',
        'The <b>captain</b> reads speed and threat on the main screen and calls priorities.',
      ],
    });
  </script>
</body>
</html>
