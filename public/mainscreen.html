<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Main Screen</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>:root { --accent: #7ddb9a; }</style>
</head>
<body class="mainscreen-body">
  <header>
    <h1>USS Prototype — Main Screen</h1>
    <span class="room-code"></span>
    <span class="conn-dot"></span>
  </header>
  <div id="toasts"></div>

  <main>
    <!-- Simulated view outside the ship -->
    <canvas id="viewscreen"></canvas>

    <!-- Captain's tactical readout: per-station + ship-system status overlaid on
         the viewscreen so a screen-less commander can see who needs help. -->
    <div id="captain-hud" class="captain-hud hidden">
      <div class="cap-row" id="cap-helm"><span class="cap-name">HELM</span><span class="cap-val"></span></div>
      <div class="cap-row" id="cap-eng"><span class="cap-name">ENG</span><span class="cap-val"></span></div>
      <div class="cap-row" id="cap-wep"><span class="cap-name">WEP</span><span class="cap-val"></span></div>
      <!-- Captain's situational rows: what's inbound and where the next ring
           is — the information a caller needs to actually call plays. -->
      <div class="cap-row" id="cap-threat"><span class="cap-name">THR</span><span class="cap-val"></span></div>
      <div class="cap-row" id="cap-nav"><span class="cap-name">NAV</span><span class="cap-val"></span></div>
    </div>

    <!-- Sim-debug overlay (shown only when the run was launched with debug on) -->
    <div id="debug-panel" class="hidden"></div>

    <!-- Ship status HUD along the bottom, visible to the whole room -->
    <div class="hud">
      <div class="cell">
        <div class="label">Hull</div>
        <div class="meter good"><div id="hull-bar"></div></div>
      </div>
      <div class="cell">
        <div class="label">Shields <span id="shield-state"></span></div>
        <div class="meter"><div id="shield-bar"></div></div>
      </div>
      <div class="cell">
        <div class="label" id="progress-label">Distance to Destination</div>
        <div class="meter"><div id="progress-bar"></div></div>
      </div>
      <div class="cell">
        <div class="label">Mission Clock</div>
        <div class="readout" id="clock">0:00</div>
      </div>
      <div class="cell" style="flex:2; min-width:220px">
        <div class="label">Ship's Log</div>
        <div class="log" id="log"></div>
      </div>
    </div>
  </main>

  <!-- Lobby: join instructions everyone in the room can read -->
  <div class="overlay hidden" id="lobby-overlay">
    <h2>Awaiting Crew</h2>
    <img id="qr" alt="Join QR code" width="260" height="260" style="border-radius:12px;">
    <div class="big-code" id="big-code"></div>
    <p style="color:var(--dim)" id="join-url"></p>
    <p id="lobby-crew" style="color:var(--dim)"></p>
    <!-- Mission picker: authored missions + procedural presets, populated
         from the catalog the server sends on join -->
    <div style="width:min(28rem, 90%); text-align:left;">
      <!-- Ship naming: pure fiction, no mechanics — flavors the log, the
           header, and the debrief. The field persists across runs. -->
      <div class="label" style="margin-bottom:0.3rem;">Ship name <span style="color:var(--dim); text-transform:none; letter-spacing:0;">(optional)</span></div>
      <input type="text" id="ship-name" maxlength="24" placeholder="e.g. Dauntless" autocomplete="off" style="margin-bottom:0.7rem;">
      <div class="label" style="margin-bottom:0.3rem;">Mission</div>
      <select id="mission-select"></select>
      <p id="mission-desc" style="color:var(--dim); font-size:0.85rem; margin-top:0.5rem; min-height:3em;"></p>
      <!-- Per-console difficulty, visible to the whole party (design pillar:
           varied skill levels on one crew). "Crew default" leaves whatever the
           player chose on their own join screen untouched. -->
      <div class="label" style="margin-bottom:0.3rem;">Console difficulty</div>
      <div id="difficulty-row" style="display:flex; gap:0.5rem; margin-bottom:0.7rem;">
        <label style="flex:1; color:var(--dim); font-size:0.8rem;">Helm
          <select id="diff-helm" class="diff-select"><option value="">crew default</option><option value="chill">chill</option><option value="normal">normal</option><option value="intense">intense</option></select>
        </label>
        <label style="flex:1; color:var(--dim); font-size:0.8rem;">Engineering
          <select id="diff-engineering" class="diff-select"><option value="">crew default</option><option value="chill">chill</option><option value="normal">normal</option><option value="intense">intense</option></select>
        </label>
        <label style="flex:1; color:var(--dim); font-size:0.8rem;">Weapons
          <select id="diff-weapons" class="diff-select"><option value="">crew default</option><option value="chill">chill</option><option value="normal">normal</option><option value="intense">intense</option></select>
        </label>
      </div>
      <!-- Game setup: expose sim-debug controls (pause/speed/spawn) on the main
           screen and to any "Sim Supervisor" role that joins the room. -->
      <label style="display:flex; gap:0.5rem; align-items:center; color:var(--dim); font-size:0.9rem;">
        <input type="checkbox" id="debug-toggle" style="width:auto;"> Expose sim-debug controls (pause / speed / spawn)
      </label>
    </div>
    <button class="primary" id="launch-btn">Launch Mission</button>
  </div>

  <!-- Debrief: full mission results for the whole room -->
  <div class="overlay hidden" id="debrief-overlay">
    <h2 id="debrief-title">Mission Debrief</h2>
    <p id="debrief-mission" style="color:var(--dim)"></p>
    <div class="grade" id="debrief-grade"></div>
    <p id="debrief-narrative" style="max-width:30rem"></p>
    <div class="stats-grid" id="debrief-stats"></div>
    <!-- Crew performance: the per-console telemetry, so the debrief talk can
         be about what each station actually did (orders vs outcomes). -->
    <div class="label" style="margin-top:0.8rem;">Crew Performance</div>
    <div class="stats-grid" id="debrief-crew"></div>
    <!-- The full captain's log, written out for review. -->
    <div class="label" style="margin-top:0.8rem;">Captain's Log</div>
    <div id="debrief-log" class="log" style="max-height: 18vh; width: min(34rem, 90vw); text-align: left;"></div>
    <button class="primary" id="return-btn">Return to Ready Room</button>
  </div>

  <script type="module" src="/js/mainscreen.js"></script>
</body>
</html>
