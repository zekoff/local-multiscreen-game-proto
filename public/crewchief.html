<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Crew Chief Station</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>:root { --accent: #37c8c0; }</style>
</head>
<body>
  <header>
    <h1>Crew Chief</h1>
    <span class="room-code"></span>
    <span class="conn-dot"></span>
  </header>
  <div id="toasts"></div>

  <!-- The console is a layout list of portable widgets (see widget.js). -->
  <main id="cc-widgets"></main>

  <!-- Phase overlays (shared shell fills these in) -->
  <div class="overlay hidden" id="lobby-overlay">
    <h2>Standing By</h2>
    <p id="lobby-crew" style="color:var(--dim)"></p>
    <button class="primary" id="launch-btn">Launch Mission</button>
  </div>
  <div class="overlay hidden" id="debrief-overlay">
    <h2 id="debrief-title">Mission Debrief</h2>
    <div class="grade" id="debrief-grade"></div>
    <p id="debrief-narrative" style="max-width:26rem"></p>
    <div class="label" style="margin-top:0.6rem;">Captain's Log</div>
    <div id="debrief-log" class="log" style="max-height: 22vh; width: min(26rem, 88vw); text-align: left;"></div>
    <button class="primary" id="return-btn">Return to Ready Room</button>
  </div>

  <script type="module">
    import { initStation, mountHelp } from '/js/station.js';
    import { createAudio } from '/js/audio.js';
    import { playFxAudio, readyRoomAmbient } from '/js/fx-audio.js';
    import { createIntents } from '/js/optimistic.js';
    import { mountWidgets } from '/js/widget.js';
    import { shipVitals, powerStatus } from '/js/widgets/common.js';
    import { cargoHold, damageControl } from '/js/widgets/crewchief.js';

    // Console-local audio: the Crew Chief owns the deck sounds — cargo stow /
    // jettison, fire + boarders alarms. (Tractor hum moved to Weapons.)
    const audio = createAudio();
    for (const ev of ['pointerdown', 'keydown', 'touchstart']) window.addEventListener(ev, () => audio.resume());
    const CREWCHIEF_FX = new Set(['stow', 'jettison', 'fire', 'boarders']);

    const intents = createIntents();
    let host = null;

    const net = initStation({
      seat: 'crewchief',
      intents,
      render(state) {
        playFxAudio(state.fx, audio, CREWCHIEF_FX);
        readyRoomAmbient(audio, state.phase); // soft lobby bed while standing by
        if (host) host.render(state);
      },
    });

    // Lay out the console. Cargo + damage control are the Crew Chief's own;
    // ship vitals + power grid are portable read-only widgets for situational
    // awareness (proof the abstraction moves display widgets freely).
    host = mountWidgets(
      document.getElementById('cc-widgets'),
      [cargoHold, damageControl, shipVitals, powerStatus],
      { net, intents, audio, seat: 'crewchief' },
    );

    mountHelp({
      title: 'Crew Chief — you run the deck',
      diagram: `
        <svg viewBox="0 0 340 130" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="9">
          <!-- tractor beam pulling a pod into the hold -->
          <rect x="14" y="16" width="150" height="46" rx="8" fill="none" stroke="#39456b"/>
          <text x="89" y="30" fill="#7d8db3" text-anchor="middle">TRACTOR BEAM</text>
          <circle cx="34" cy="48" r="6" fill="currentColor"/>
          <line x1="40" y1="48" x2="150" y2="48" stroke="currentColor" stroke-dasharray="3 3"/>
          <rect x="150" y="42" width="12" height="12" rx="2" fill="none" stroke="currentColor"/>
          <text x="89" y="78" fill="#7d8db3" text-anchor="middle">latch → hold the line → aboard</text>
          <!-- damage control: crew to tasks -->
          <rect x="176" y="16" width="150" height="46" rx="8" fill="none" stroke="#39456b"/>
          <text x="251" y="30" fill="#ff6f6f" text-anchor="middle">FIRE — DECK 3</text>
          <circle cx="210" cy="48" r="5" fill="currentColor"/>
          <circle cx="224" cy="48" r="5" fill="currentColor"/>
          <text x="251" y="52" fill="#7d8db3" text-anchor="middle">assign crew →</text>
          <text x="170" y="104" fill="#7d8db3" text-anchor="middle">heavy hold = sluggish helm — jettison to lighten</text>
        </svg>`,
      lines: [
        'You run the <b>tractor beam</b> and the <b>deck crew</b> — the ship\'s hands.',
        '<b>Tractor</b>: latch a rescue pod or salvage that Sensors have identified, then Helm must <b>hold the line</b> or the beam breaks. The <b>laser can\'t fire</b> while you\'re latched — coordinate with Weapons.',
        'A <b>full cargo hold</b> makes the ship turn slowly. <b>Jettison</b> to get your maneuverability back if Helm needs it.',
        '<b>Damage control</b>: assign your crew to fires, boarders, and hull breaches. Left alone, a fire burns the hull down — put hands on it fast.',
        '<b>Confirm before Weapons fires</b> — a pod looks like a rock until Sensors resolve it. That\'s the whole crew\'s job, and you\'re the one who tows it home.',
      ],
    });
  </script>
</body>
</html>
