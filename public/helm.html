<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Helm Station</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    :root { --accent: #6fa8ff; }
    /* Instant tactile ack for a steering nudge: the marker flares briefly. */
    .align-marker.nudging { box-shadow: 0 0 10px 3px var(--accent); }
  </style>
</head>
<body>
  <header>
    <h1>Helm</h1>
    <span class="room-code"></span>
    <span class="conn-dot"></span>
  </header>
  <div id="toasts"></div>

  <main>
    <!-- Speed / progress readouts -->
    <div class="panel">
      <div class="spread">
        <div><div class="label">Velocity</div><div class="readout" id="speed">0</div></div>
        <div style="text-align:right"><div class="label" id="dist-label">Distance to Station</div><div class="readout" id="dist">—</div></div>
      </div>
    </div>

    <!-- Throttle control -->
    <div class="panel">
      <h2>Throttle <span id="throttle-val" style="color:var(--accent)">0%</span></h2>
      <input type="range" id="throttle" min="0" max="100" step="5" value="0">
    </div>

    <!-- Course alignment: keep the marker centered against drift -->
    <div class="panel">
      <h2>Course Alignment <span id="align-state" style="color:var(--accent)"></span></h2>
      <div class="align-track"><div class="align-zone" id="align-zone"></div><div class="align-marker" id="align-marker"></div></div>
      <div class="row" style="margin-top:0.75rem;">
        <button id="port-btn">&larr; Port</button>
        <button id="starboard-btn">Starboard &rarr;</button>
      </div>
      <!-- Next fly-through nav gate: line up before it reaches you -->
      <p id="gate-readout" style="margin-top:0.75rem; text-align:center; color:var(--dim); min-height:1.4em;"></p>
    </div>

    <!-- Emergency Warp: jump clear of all threats, at a heavy systems cost -->
    <div class="panel">
      <h2>Emergency</h2>
      <button class="danger" id="warp-btn" style="width:100%">Emergency Warp</button>
      <p style="color:var(--dim); font-size:0.8rem; margin-top:0.5rem;">
        Jumps clear of every threat — but scatters all power, drops shields &amp; weapons,
        trips every breaker, and throws you off course. Last resort.</p>
    </div>
  </main>

  <!-- Phase overlays (shared shell fills these in) -->
  <div class="overlay hidden" id="lobby-overlay">
    <h2>Standing By</h2>
    <p id="lobby-crew" style="color:var(--dim)"></p>
    <button class="primary" id="launch-btn">Launch Mission</button>
  </div>
  <div class="overlay hidden" id="debrief-overlay">
    <h2 id="debrief-title">Mission Debrief</h2>
    <div class="grade" id="debrief-grade"></div>
    <p id="debrief-narrative" style="max-width:26rem"></p>
    <div class="label" style="margin-top:0.6rem;">Captain's Log</div>
    <div id="debrief-log" class="log" style="max-height: 22vh; width: min(26rem, 88vw); text-align: left;"></div>
    <button class="primary" id="return-btn">Return to Ready Room</button>
  </div>

  <script type="module">
    import { initStation, mountHelp, fmtTime } from '/js/station.js';
    import { createAudio } from '/js/audio.js';
    import { playFxAudio } from '/js/fx-audio.js';
    import { createIntents } from '/js/optimistic.js';

    // Helm-local audio: the nav-gate pass/miss chimes and a subtle blip on each
    // steering nudge. (Music + ship-wide booms live on the main screen.)
    const audio = createAudio();
    for (const ev of ['pointerdown', 'keydown', 'touchstart']) window.addEventListener(ev, () => audio.resume());
    const HELM_FX = new Set(['gate', 'debris']);

    const throttle = document.getElementById('throttle');
    const warpBtn = document.getElementById('warp-btn');
    let draggingThrottle = false;

    const intents = createIntents();
    const net = initStation({
      seat: 'helm',
      intents,
      render(state) {
        playFxAudio(state.fx, audio, HELM_FX); // gate pass/miss chimes
        document.getElementById('speed').textContent = state.speed.toFixed(1);
        // Mission-configurable readout: parsecs count down to 0 at dock, or a
        // failure-clock countdown on missions that define one.
        if (state.readout) {
          document.getElementById('dist-label').textContent = state.readout.label
            || (state.readout.kind === 'countdown' ? 'Time Remaining' : `Distance to ${state.mission?.arrivalName ?? 'Destination'}`);
          document.getElementById('dist').textContent = state.readout.kind === 'countdown'
            ? fmtTime(state.readout.remaining)
            : `${state.readout.remaining.toFixed(1)} ${state.readout.unit}`;
        }
        // Throttle is a commanded setpoint: echo the value just sent (intent)
        // until the snapshot repeats it back, so the readout never snaps to a
        // stale % for a tick. Derived values (speed) stay server-driven.
        const shownThrottle = intents.get('throttle') ?? state.throttle;
        // Don't fight the player's finger: only sync the slider when idle.
        if (!draggingThrottle) throttle.value = shownThrottle;
        document.getElementById('throttle-val').textContent = `${shownThrottle}%`;
        // Alignment marker: map -100..100 onto the track width.
        const pct = (state.alignment + 100) / 200;
        document.getElementById('align-marker').style.left = `calc(${(pct * 100).toFixed(1)}% - 5px)`;
        // Nav-gate pass window (widens with effective engine power): 12 + 18*(eff/4).
        // The window is centered on the gate's BEARING (well off the 0 course
        // line) so the helm has to actively swing onto it; with no gate, the
        // band just marks the on-course zone around 0. A tripped engines breaker
        // halves engine power (mirrors eff() in src/engine/game.ts).
        const effEngines = state.power.engines * (state.breakers.engines ? 0.5 : 1);
        const win = 12 + 18 * (effEngines / 4);
        const gates = state.gates || [];
        const next = gates.length ? gates.reduce((a, b) => (a.reachIn < b.reachIn ? a : b)) : null;
        const center = next ? next.bearing : 0;
        const half = next ? win : 15;
        const zone = document.getElementById('align-zone');
        zone.style.left = `${((center - half + 100) / 200 * 100).toFixed(1)}%`;
        zone.style.width = `${(2 * half / 200 * 100).toFixed(1)}%`;
        const lined = Math.abs(state.alignment - center) <= half;
        document.getElementById('align-state').textContent = lined ? (next ? 'on the gate' : 'on course') : 'off line';
        document.getElementById('align-state').style.color = lined ? 'var(--good)' : 'var(--warn)';
        // Next nav gate readout: closest gate, its bearing, and steering hint.
        // A debris field takes over the line — throttle discipline is this
        // console's call and outranks ring-chasing while the hull is scraping.
        const gateEl = document.getElementById('gate-readout');
        if (state.debrisIn > 0) {
          gateEl.textContent = `DEBRIS FIELD ${Math.ceil(state.debrisIn)}s — keep throttle under 40% or the hull scours.`;
          gateEl.style.color = 'var(--bad)';
        } else if (next) {
          const dir = next.bearing > 0 ? 'starboard' : 'port';
          gateEl.textContent = lined
            ? `${next.label} in ${Math.ceil(next.reachIn)}s — on the gate ✓`
            : `${next.label} in ${Math.ceil(next.reachIn)}s — swing ${dir} (ease throttle to turn faster)`;
          gateEl.style.color = lined ? 'var(--good)' : 'var(--warn)';
        } else {
          gateEl.textContent = 'No nav gate ahead.';
          gateEl.style.color = 'var(--dim)';
        }
        // Emergency Warp availability (a just-tapped warp reads engaged
        // immediately via the optimistic flash, before the cooldown arrives).
        const warping = intents.has('warped');
        warpBtn.disabled = warping || state.warpReadyIn > 0;
        warpBtn.textContent = warping
          ? 'WARP!'
          : state.warpReadyIn > 0
            ? `Warp charging (${Math.ceil(state.warpReadyIn)}s)`
            : 'Emergency Warp';
      },
    });

    // Throttle sends on change; track dragging so render() doesn't stomp it.
    throttle.addEventListener('pointerdown', () => (draggingThrottle = true));
    throttle.addEventListener('pointerup', () => (draggingThrottle = false));
    throttle.addEventListener('input', () => {
      const value = Number(throttle.value);
      net.action({ kind: 'throttle', value });
      // Setpoint echo: hold the commanded % until the server repeats it back.
      intents.set('throttle', value, (s) => s.throttle === value);
      document.getElementById('throttle-val').textContent = `${value}%`;
    });

    // Hold-to-steer: the engine still turns once per tick, but the helmsman can
    // just hold the button down instead of tapping repeatedly. Pressing fires an
    // immediate nudge, then repeats every tick (~250ms) until release.
    const NUDGE_MS = 250; // matches the server tick, so held = one nudge per tick
    function holdToSteer(btn, dir) {
      let timer = null;
      btn.style.touchAction = 'none'; // no scroll/zoom hijack of a held press
      const marker = document.getElementById('align-marker');
      const fire = () => {
        net.action({ kind: 'nudge', dir });
        audio.nudgeTick();
        // Visual acknowledgment (not prediction): pulse the course marker so
        // the press registers instantly; its position stays server-driven.
        marker.classList.add('nudging');
        setTimeout(() => marker.classList.remove('nudging'), 180);
      };
      const start = (e) => {
        e.preventDefault();
        if (timer !== null) return;
        fire();
        timer = setInterval(fire, NUDGE_MS);
      };
      const stop = () => { if (timer !== null) { clearInterval(timer); timer = null; } };
      btn.addEventListener('pointerdown', start);
      btn.addEventListener('pointerup', stop);
      btn.addEventListener('pointerleave', stop);
      btn.addEventListener('pointercancel', stop);
      btn.addEventListener('contextmenu', (e) => e.preventDefault());
    }
    holdToSteer(document.getElementById('port-btn'), -1);
    holdToSteer(document.getElementById('starboard-btn'), 1);

    // Console tutorial (the "?" in the header).
    mountHelp({
      title: 'Helm — you fly the ship',
      lines: [
        '<b>Throttle</b> sets speed. <b>Port / Starboard</b> steer (hold to keep turning).',
        'Turns bite harder with more <b>engine power</b> (ask Engineering) and with the <b>throttle eased off</b> — slow down to swing hard.',
        '<b>Slipstream rings</b> spawn off-course: swing onto the ring’s bearing before it arrives for a big speed boost.',
        'In a <b>debris field</b>, keep the throttle under 40% or the hull scours.',
        '<b>Emergency Warp</b> escapes everything but scatters every system — a last resort, not a habit.',
        'Call out what you need — the captain sees the whole sky on the main screen.',
      ],
    });
    warpBtn.addEventListener('click', () => net.action({ kind: 'warp' }));
  </script>
</body>
</html>
